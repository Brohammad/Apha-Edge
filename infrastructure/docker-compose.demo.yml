# Public demo stack — single URL (gateway :8080) serves SPA + API proxy.
# Usage: see docs/DEMO_DEPLOY.md or `make demo`

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphaedge
      POSTGRES_PASSWORD: alphaedge
      POSTGRES_DB: alphaedge
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaedge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env.demo
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://alphaedge:alphaedge@postgres:5432/alphaedge
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
      - ../backend/scripts:/app/scripts
      - ../docker/entrypoint-demo-api.sh:/app/entrypoint-demo-api.sh:ro
    entrypoint: ["/bin/sh", "/app/entrypoint-demo-api.sh"]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file:
      - ../.env.demo
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://alphaedge:alphaedge@postgres:5432/alphaedge
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
    command: celery -A alphaedge.shared.infrastructure.celery_app worker --loglevel=info

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  demo_postgres_data:
