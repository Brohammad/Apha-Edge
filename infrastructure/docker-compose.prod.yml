# Production deploy — HTTPS via Caddy at alphaedge.brohammad.tech
# Requires: DNS A record → this server's public IP, ports 80/443 open.
# Usage: make prod  (see docs/DEPLOY_HOSTINGER.md)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: alphaedge
      POSTGRES_PASSWORD: alphaedge
      POSTGRES_DB: alphaedge
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaedge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://alphaedge:alphaedge@postgres:5432/alphaedge
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
      - ../backend/scripts:/app/scripts
      - ../docker/entrypoint-demo-api.sh:/app/entrypoint-demo-api.sh:ro
    entrypoint: ["/bin/sh", "/app/entrypoint-demo-api.sh"]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://alphaedge:alphaedge@postgres:5432/alphaedge
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
    command: celery -A alphaedge.shared.infrastructure.celery_app worker --loglevel=info

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  prod_postgres_data:
  caddy_data:
  caddy_config:
