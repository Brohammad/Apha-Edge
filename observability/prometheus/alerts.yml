groups:
  - name: alphaedge
    rules:
      - alert: HighRiskGateRejections
        expr: rate(alphaedge_risk_gate_rejections_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Elevated risk gate rejections
      - alert: CeleryTaskFailures
        expr: rate(alphaedge_celery_tasks_total{outcome="failure"}[10m]) > 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Celery task failure rate elevated
      - alert: ApiLatencyHigh
        expr: histogram_quantile(0.95, rate(alphaedge_http_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency above 2s
